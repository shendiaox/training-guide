// ===== Render Personnel =====
function renderPersonnel(filter) {
  var list = PERSONNEL;
  var keyword = (filter || '').toLowerCase().trim();
  if (keyword) {
    list = PERSONNEL.filter(function(p) {
      var phone = d(p.phone);
      return p.name.toLowerCase().includes(keyword) ||
             p.unit.toLowerCase().includes(keyword) ||
             phone.slice(-4).includes(keyword) ||
             phone.includes(keyword);
    });
  }
  document.getElementById('searchStats').innerHTML = keyword
    ? '鎵惧埌 <strong>' + list.length + '</strong> 浜猴紙鍏?43 浜猴級'
    : '鍏?<strong>43</strong> 浜?;

  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var phone = d(p.phone);
    var masked = maskPhone(phone);
    var avatarClass = p.gender === '濂? ? 'avatar-female' : 'avatar-male';
    var initial = p.name.charAt(p.name.length - 1); // last char as avatar

    // Highlight matching text
    var nameHtml = p.name;
    var unitHtml = p.unit;
    var phoneDisplay = masked;
    if (keyword) {
      var re = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      nameHtml = p.name.replace(re, '<span class="highlight">$1</span>');
      unitHtml = p.unit.replace(re, '<span class="highlight">$1</span>');
      if (phone.slice(-4).includes(keyword) || phone.includes(keyword)) {
        phoneDisplay = masked.replace(keyword, '<span class="highlight">$&</span>');
      }
    }

    html += '<div class="person-card" onclick="revealPhone(this, \'' + p.phone + '\')" title="鐐瑰嚮鏌ョ湅瀹屾暣鍙风爜">' +
      '<div class="person-avatar ' + avatarClass + '">' + initial + '</div>' +
      '<div class="person-info">' +
        '<div class="pi-name">' + nameHtml + ' <span style="font-size:11px;color:#95a5a6;font-weight:400">' + p.gender + '</span></div>' +
        '<div class="pi-unit">' + unitHtml + (p.title ? ' 路 ' + p.title : '') + '</div>' +
      '</div>' +
      '<div class="person-phone" data-raw="' + p.phone + '">馃摓 ' + phoneDisplay + '</div>' +
    '</div>';
  }

  }
  document.getElementById('personnelList').innerHTML = html;
}

}

// ===== Phone Reveal =====
function revealPhone(el, b64) {
  var phoneDiv = el.querySelector('.person-phone');
  if (phoneDiv.classList.contains('revealed')) {
    // Already revealed 鈥?copy to clipboard
    var phone = d(b64);
    copyToClipboard(phone);
    showToast('宸插鍒讹細' + phone);
    return;
  }
  // Reveal
  var phone = d(b64);
  phoneDiv.classList.add('revealed');
  phoneDiv.textContent = '馃摓 ' + phone;
  showToast('鍙风爜宸叉樉绀猴紝鍐嶆鐐瑰嚮鍙鍒?);
}

// ===== Contact Card Phone Copy =====
function copyPhone(el, b64) {
  var phone = d(b64);
  copyToClipboard(phone);
  el.textContent = '馃摓 ' + phone + ' 鉁?;
  showToast('宸插鍒讹細' + phone);
  setTimeout(function() {
    el.textContent = '馃摓 ' + maskPhone(phone);
  }, 2000);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function(){});
    return;
  }
  // Fallback
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// ===== Toast =====
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1800);
}

// ===== Tab Switching =====
function switchTab(tabName, el) {
  // Update tab bar
  document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
  if (el) el.classList.add('active');
  // Update content
  document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
  document.getElementById('tab-' + tabName).classList.add('active');
  // Re-render personnel if switching to it
  if (tabName === 'personnel') {
    renderPersonnel(document.getElementById('searchInput').value);
  }
}

// ===== Day Switching =====
function switchDay(dayIndex) {
  document.querySelectorAll('.day-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === dayIndex);
  });
  document.querySelectorAll('.schedule-day').forEach(function(d, i) {
    d.classList.toggle('active', i === dayIndex);

}
